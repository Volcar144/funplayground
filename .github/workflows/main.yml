name: Run Build
run-name: ${{ github.actor }} triggered a build
on: [push, check_run, pull_request, pull_request_review, fork, merge_group, workflow_dispatch]
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install -y
      - run: pnpm build -y
